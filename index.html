<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">

    <header>
        <h1>🎬 AI Video Studio</h1>
        <div class="header-buttons">
            <button id="theme-toggle">🌙</button>
            <button id="settingsBtn">⚙</button>
        </div>
    </header>

    <div id="studio">
        <p>Turn your ideas into viral videos with the power of AI.</p>
        
        <div class="controls">
            <input type="text" id="topic" placeholder="Enter a topic, e.g., 'cosmic wonders'">
            <button id="generateBtn">🚀 Generate</button>
        </div>

        <div id="loader" style="display: none;"></div>
        
        <div id="video-player">
             <!-- Video scenes will be displayed here -->
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Global Settings</h2>
            <div class="setting-group">
                <label for="ai-voice">AI Voice</label>
                <select id="ai-voice"></select>
            </div>
            <div class="setting-group">
                <label for="bg-music">Background Music</label>
                <select id="bg-music">
                    <option value="none">None</option>
                    <option value="cinematic-ambient">Cinematic Ambient</option>
                    <option value="motivational-uplifting">Motivational Uplifting</option>
                    <option value="news-beat">News Beat</option>
                </select>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
